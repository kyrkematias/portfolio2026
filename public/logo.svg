<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 60" width="380" height="60">
  <defs>
    <!-- Gradient for logo icon border and accents -->
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>

    <!-- Subtle background fill gradient for icon -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#18192b" />
      <stop offset="100%" stop-color="#0e0f1a" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Logo Icon Container (Rounded Hexagon / Box) -->
  <g transform="translate(4, 4)">
    <!-- Outer Glow & Border -->
    <rect x="2" y="2" width="48" height="48" rx="12" fill="url(#bgGrad)" stroke="url(#neonGrad)" stroke-width="2.5" filter="url(#glow)" />
    
    <!-- Stylized MM Monogram Vector -->
    <path d="M 13 38 V 16 L 22 28 L 26 28 L 30 16 V 38" fill="none" stroke="url(#neonGrad)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M 22 38 V 22 L 31 35 L 39 22 V 38" fill="none" stroke="#ffffff" stroke-opacity="0.9" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Logo Text: MM -->
  <text x="68" y="38" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="22" letter-spacing="1" fill="url(#neonGrad)">
    MM
  </text>

  <!-- Separator Dot/Dash -->
  <circle cx="114" cy="31" r="3" fill="#ec4899" />

  <!-- Logo Text: POSICIONAMIENTO WEB -->
  <text x="128" y="37" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="14" letter-spacing="2" fill="#ffffff">
    POSICIONAMIENTO WEB
  </text>
</svg>
